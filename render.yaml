services:
  - type: web
    name: chapter6-solo-app
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3-flash-preview
      - key: GEMINI_TTS_MODEL
        value: gemini-2.5-flash-preview-tts
      - key: GEMINI_TTS_VOICE
        value: Kore
